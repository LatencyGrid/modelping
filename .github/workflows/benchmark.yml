name: Run Benchmarks

on:
  workflow_dispatch:        # Manual trigger only (schedule paused permanently)

jobs:
  benchmark-us-east:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
      GLADIA_API_KEY: ${{ secrets.GLADIA_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
      FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
      LMNT_API_KEY: ${{ secrets.LMNT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install modelping
        run: pip install -e . -q

      - name: Run LLM benchmarks
        run: modelping run --all --runs 5 --json 2>/dev/null > llm-results.json

      - name: Run STT benchmarks
        run: python3 .github/scripts/run_stt.py

      - name: Run TTS benchmarks
        run: python3 .github/scripts/run_tts.py

      - name: Run Pipeline benchmark
        run: python3 .github/scripts/run_pipeline.py

      - name: Bundle and submit results
        run: python3 .github/scripts/bundle_and_submit.py

      - name: Verify submission
        run: |
          python3 -c "
          import requests
          r = requests.get('https://api.latencygrid.dev/results')
          d = r.json()
          print(f'Leaderboard has {d[\"count\"]} submissions')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results.json
          retention-days: 90

      - name: Commit results to repo
        continue-on-error: true
        run: |
          git config user.email "hello@latencygrid.dev"
          git config user.name "LatencyGrid Bot"
          mkdir -p benchmark-data
          cp benchmark-results.json benchmark-data/us-east-$(date +%Y-%m-%d).json
          git add benchmark-data/
          git diff --staged --quiet || git commit -m "data: benchmark results us-east $(date +%Y-%m-%d)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
